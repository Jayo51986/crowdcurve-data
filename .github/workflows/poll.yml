name: CrowdCurve data engine
on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run poller
        run: python poller.py
      - name: Commit data
        run: |
          git config user.name "crowdcurve-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "data $(date -u +%FT%TZ)"
          git push
